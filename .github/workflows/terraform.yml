name: Terraform Validation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

      region:
        description: "Select Region"
        required: true
        type: choice
        options:
          - us-east-2
          - us-east-1

permissions:
  id-token: write
  contents: read


jobs:


# -------------------------
# FORMAT CHECK (independent)
# -------------------------
  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

# -------------------------
# TFLINT CHECK 
# -------------------------
  tflint:
    name: Terraform lint check
    runs-on: ubuntu-latest

    needs: fmt

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        
      - name: Initialize TFLint
        run: tflint --init 

      - name: Run TFLint (Platform)
        working-directory: live/${{ inputs.environment }}/platform
        run: tflint

      - name: Run TFLint (Data)
        working-directory: live/${{ inputs.environment }}/data
        run: tflint

  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    needs: fmt

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -------------------------
# TRIVY SECURITY SCAN
# -------------------------
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    needs: fmt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.71.0

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
              

# -------------------------
# PLATFORM JOB 
# -------------------------
  platform-plan:
    name: Platform Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: 
      - tflint
      - gitleaks
      - trivy

    environment: ${{ inputs.environment }}

    env:
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Terraform Setup
        uses: ./.github/actions/terraform-setup
        with:
          aws-role: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate 

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=platform.tfplan-${{ inputs.environment }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-tfplan-${{ inputs.environment }}
          path: live/${{ inputs.environment }}/platform/platform.tfplan-${{ inputs.environment }}

# -------------------------
# PLATFORM APPLY JOB 
# -------------------------

  platform-apply:
    name: Platform Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: platform-plan

    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Terraform Setup
        uses: ./.github/actions/terraform-setup
        with:
          aws-role: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-tfplan-${{ inputs.environment }}
          path: live/${{ inputs.environment }}/platform

      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Apply
        run: terraform apply -auto-approve platform.tfplan-${{ inputs.environment }}


# -------------------------
# DATA JOB (DEPENDS ON PLATFORM)
# -------------------------
  data-plan:
    name: Data Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest

    needs: platform-apply

    environment: ${{ inputs.environment }}

    env:
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Terraform Setup
        uses: ./.github/actions/terraform-setup
        with:
          aws-role: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate 

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=data.tfplan-${{ inputs.environment }}

      - name: Upload Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-tfplan-${{ inputs.environment }}
          path: live/${{ inputs.environment }}/data/data.tfplan-${{ inputs.environment }}


# -------------------------
# DATA Apply JOB (DEPENDS ON PLATFORM APPLY)
# -------------------------
        
  data-apply:
    name: Data Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    
    needs: data-plan

    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Terraform Setup
        uses: ./.github/actions/terraform-setup
        with:
          aws-role: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Download Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: data-tfplan-${{ inputs.environment }}
          path: live/${{ inputs.environment }}/data

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve data.tfplan-${{ inputs.environment }}